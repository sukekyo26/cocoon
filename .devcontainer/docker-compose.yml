# Auto-generated from workspace.toml — do not edit directly.
services:
  cocoon:
    container_name: "${CONTAINER_SERVICE_NAME}"
    build:
      context: ".."
      dockerfile: ".devcontainer/Dockerfile"
      secrets:
        - "sudo_password"
      args:
        - "IMAGE=${IMAGE}"
        - "IMAGE_VERSION=${IMAGE_VERSION}"
        - "USERNAME=${USERNAME}"
    environment:
      - "CONTAINER_SERVICE_NAME=${CONTAINER_SERVICE_NAME}"
      - "TZ=Asia/Tokyo"
    volumes:
      - "../..:/home/${USERNAME}/work:cached"
      - "local:/home/${USERNAME}/.local"
      - "cocoon:/home/${USERNAME}/.cocoon"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "claude:/home/${USERNAME}/.claude"
      - "codex:/home/${USERNAME}/.codex"
      - "copilot:/home/${USERNAME}/.copilot"
      - "config:/home/${USERNAME}/.config"
      - "npm:/home/${USERNAME}/.npm"
      - "npm-global:/home/${USERNAME}/.npm-global"
      - "go:/home/${USERNAME}/go"
      - "${HOME:?HOME must be set on the host}/.claude.json:/home/${USERNAME}/.claude.json"
    tty: true
    init: true
    command: "sleep infinity"
    stop_grace_period: "30s"
    shm_size: "1gb"
    pids_limit: 4096
    ulimits:
      nofile:
        soft: 65536
        hard: 1048576
volumes:
  local:
    name: "${COMPOSE_PROJECT_NAME}_${CONTAINER_SERVICE_NAME}_local"
  cocoon:
    name: "${COMPOSE_PROJECT_NAME}_${CONTAINER_SERVICE_NAME}_cocoon"
  claude:
