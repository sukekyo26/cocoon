  npm:
    name: "${COMPOSE_PROJECT_NAME}_${CONTAINER_SERVICE_NAME}_npm"
  npm-global:
    name: "${COMPOSE_PROJECT_NAME}_${CONTAINER_SERVICE_NAME}_npm-global"
  go:
    name: "${COMPOSE_PROJECT_NAME}_${CONTAINER_SERVICE_NAME}_go"
