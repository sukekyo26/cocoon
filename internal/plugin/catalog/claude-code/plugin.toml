[metadata]
name = "Claude Code"
description = "Claude Code — AI-powered coding assistant by Anthropic"
url = "https://github.com/anthropics/claude-code"
default = false

[install]
requires_root = false
volumes = ["/home/${USERNAME}/.claude"]

[install.env]
PATH = "/home/${USERNAME}/.local/bin:$PATH"

[version]
version_capable = false
