[metadata]
name = "Claude Code"
description = "Claude Code — AI-powered coding assistant by Anthropic"
url = "https://github.com/anthropics/claude-code"
default = false

# Claude Code's bash sandbox needs bubblewrap + seccomp for process isolation
# and socat for the network proxy; seccomp is a kernel feature, ripgrep ships
# with Claude Code itself, so only these two apt packages are required.
[apt]
packages = ["bubblewrap", "socat"]

[install]
requires_root = false
volumes = ["/home/${USERNAME}/.claude"]
default_method = "installer"

[install.methods.installer]
description = "Upstream claude.ai installer script piped to bash"

[install.env]
PATH = "/home/${USERNAME}/.local/bin:$PATH"

[version]
version_capable = false
