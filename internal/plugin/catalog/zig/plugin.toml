[metadata]
name = "Zig"
description = "Zig programming language, required for cargo-lambda cross-compilation"
url = "https://github.com/ziglang/zig"
default = false

[apt]
packages = ["jq"]

[install]
requires_root = true
default_method = "archive"

[install.methods.archive]
description = "Multi-file Zig toolchain tarball from ziglang.org index.json"

[version]
version_capable = true

[version.source.latest]
type = "json-field"
url = "https://ziglang.org/download/index.json"
field = "master.version"

[version.source.checksum]
type = "none"

[version.source.arch]
amd64 = "x86_64"
arm64 = "aarch64"
