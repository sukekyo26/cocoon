[metadata]
name = "Zig"
description = "Zig programming language, required for cargo-lambda cross-compilation"
url = "https://github.com/ziglang/zig"
default = false

[apt]
packages = ["jq"]

[install]
requires_root = true
default_method = "archive"

[install.methods.archive]
description = "Multi-file Zig toolchain tarball from ziglang.org index.json"

[version]
version_capable = true

# No [version.source]: install.archive.sh treats $PIN as an index.json *key*
# ("master" or a tagged version like "0.14.0"), but the only machine-readable
# "latest" in index.json is master.version — a rolling dev string (e.g.
# "0.15.0-dev.123+abc") that is not an index.json key and is non-reproducible
# anyway. So zig is exact-only: pin a tagged version (zig=0.14.0); `cocoon lock`
# rejects "latest". See exactOnlyPlugins in version_source_contract_test.go.
