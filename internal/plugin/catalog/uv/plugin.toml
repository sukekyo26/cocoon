[metadata]
name = "uv"
description = "Fast Python package and project manager by Astral"
url = "https://github.com/astral-sh/uv"
default = false

[install]
requires_root = false
default_method = "installer"

[install.methods.installer]
description = "Upstream astral.sh/uv installer script piped to bash"

[install.env]
PATH = "/home/${USERNAME}/.local/bin:$PATH"

[version]
version_capable = true

[version.source.latest]
type = "github-release"
repo = "astral-sh/uv"

[version.source.checksum]
type = "none"
