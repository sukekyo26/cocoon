[metadata]
name = "Go"
description = "Go programming language"
url = "https://github.com/golang/go"
default = false

[apt]
packages = ["build-essential"]

[install]
requires_root = true
volumes = ["/home/${USERNAME}/go"]
default_method = "archive"

[install.methods.archive]
description = "Multi-file Go toolchain tarball from go.dev"

[install.env]
GOPATH = "/home/${USERNAME}/go"
PATH = "/usr/local/go/bin:$GOPATH/bin:$PATH"

[version]
version_capable = true

[version.source.latest]
type = "text"
url = "https://go.dev/VERSION?m=text"
strip_prefix = "go"

[version.source.checksum]
type = "sidecar"
asset_url = "https://dl.google.com/go/go${version}.linux-${arch}.tar.gz"
suffix = ".sha256"

[version.source.arch]
amd64 = "amd64"
arm64 = "arm64"
