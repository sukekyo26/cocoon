[metadata]
name = "Node.js"
description = "Node.js JavaScript runtime"
url = "https://github.com/nodejs/node"
default = false

[apt]
packages = ["xz-utils"]

[install]
requires_root = true
volumes = ["/home/${USERNAME}/.npm", "/home/${USERNAME}/.npm-global"]
default_method = "archive"

[install.methods.archive]
description = "Multi-file Node.js distribution tarball from nodejs.org"

[install.env]
NPM_CONFIG_PREFIX = "/home/${USERNAME}/.npm-global"
PATH = "/usr/local/node/bin:/home/${USERNAME}/.npm-global/bin:$PATH"

[version]
version_capable = true

[version.source.latest]
type = "tab"
url = "https://nodejs.org/dist/index.tab"
lts_only = true

[version.source.checksum]
type = "shasums-file"
manifest_url = "https://nodejs.org/dist/v${version}/SHASUMS256.txt"
asset_name = "node-v${version}-linux-${arch}.tar.xz"

[version.source.arch]
amd64 = "x64"
arm64 = "arm64"
