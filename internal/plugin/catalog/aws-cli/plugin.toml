[metadata]
name = "AWS CLI v2"
description = "AWS Command Line Interface"
url = "https://github.com/aws/aws-cli"
default = false

[apt]
packages = ["gnupg"]

[install]
requires_root = false
volumes = ["/home/${USERNAME}/.aws"]
default_method = "archive"

[install.methods.archive]
description = "Download and PGP-verify the AWS CLI v2 zip, then run its bundled installer"

[version]
version_capable = true
verify = "pgp"
