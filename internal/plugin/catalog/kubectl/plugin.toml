[metadata]
name = "kubectl"
description = "Kubernetes command-line tool"
url = "https://github.com/kubernetes/kubectl"
default = false

[install]
requires_root = true
default_method = "binary"

[install.methods.binary]
description = "Single binary direct from dl.k8s.io"

[version]
version_capable = true

[version.source.latest]
type = "text"
url = "https://dl.k8s.io/release/stable.txt"
strip_prefix = "v"

[version.source.checksum]
type = "sidecar"
asset_url = "https://dl.k8s.io/release/v${version}/bin/linux/${arch}/kubectl"
suffix = ".sha256"

[version.source.arch]
amd64 = "amd64"
arm64 = "arm64"
