[metadata]
name = "AWS SAM CLI"
description = "AWS Serverless Application Model CLI"
url = "https://github.com/aws/aws-sam-cli"
default = false

[install]
requires_root = false
default_method = "archive"

[install.methods.archive]
description = "Download and checksum-verify the AWS SAM CLI zip, then run sam-installation/install"

[version]
version_capable = true

[version.source.latest]
type = "github-release"
repo = "aws/aws-sam-cli"
strip_prefix = "v"

[version.source.checksum]
type = "none"
