[metadata]
name = "just"
description = "Modern command runner (an alternative to make)"
url = "https://github.com/casey/just"
default = false

[install]
requires_root = true
default_method = "binary"

[install.methods.binary]
description = "Single just binary extracted from a GitHub Release tarball"

[version]
version_capable = true

[version.source.latest]
type = "github-release"
repo = "casey/just"

[version.source.checksum]
type = "shasums-file"
manifest_url = "https://github.com/casey/just/releases/download/${version}/SHA256SUMS"
asset_name = "just-${version}-${arch}-unknown-linux-musl.tar.gz"

[version.source.arch]
amd64 = "x86_64"
arm64 = "aarch64"
