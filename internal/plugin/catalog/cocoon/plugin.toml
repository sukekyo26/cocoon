[metadata]
name = "cocoon"
description = "cocoon — generate .devcontainer/ from your config file (dogfood the tool inside the container)"
url = "https://github.com/sukekyo26/cocoon"
default = false

[install]
requires_root = true
default_method = "binary"

[install.methods.binary]
description = "Single cocoon binary downloaded from its GitHub Pages mirror"

[version]
version_capable = true

[version.source.latest]
type = "text"
url = "https://sukekyo26.github.io/cocoon/VERSION"

[version.source.checksum]
type = "shasums-file"
manifest_url = "https://sukekyo26.github.io/cocoon/v${version}/SHA256SUMS"
asset_name = "cocoon-linux-${arch}"

[version.source.arch]
amd64 = "amd64"
arm64 = "arm64"
