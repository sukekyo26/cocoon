[metadata]
name = "shfmt"
description = "Shell script formatter"
url = "https://github.com/mvdan/sh"
default = false

[install]
requires_root = true
default_method = "binary"

[install.methods.binary]
description = "Single shfmt binary direct from the GitHub Release"

[version]
version_capable = true

[version.source.latest]
type = "github-release"
repo = "mvdan/sh"
strip_prefix = "v"

[version.source.checksum]
type = "none"

[version.source.arch]
amd64 = "amd64"
arm64 = "arm64"
