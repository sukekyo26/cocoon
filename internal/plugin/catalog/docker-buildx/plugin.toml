[metadata]
name = "Docker Buildx"
description = "BuildKit-based builds and multi-platform images for the docker CLI; pair with docker-cli or a docker-bundled image"
url = "https://github.com/docker/buildx"
default = false

[install]
requires_root = true
default_method = "binary"

[install.methods.binary]
description = "Single binary from the docker/buildx GitHub Release"

[version]
version_capable = true
