[metadata]
name = "Rust"
description = "Rust toolchain via rustup — cargo, clippy, rustfmt"
url = "https://github.com/rust-lang/rustup"
default = false

[install]
requires_root = false
volumes = ["/home/${USERNAME}/.cargo", "/home/${USERNAME}/.rustup"]
default_method = "installer"

[install.methods.installer]
description = "rustup installer from sh.rustup.rs"

[install.env]
PATH = "/home/${USERNAME}/.cargo/bin:$PATH"

[version]
version_capable = false
