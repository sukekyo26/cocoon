[metadata]
name = "Dart"
description = "Dart programming language"
url = "https://github.com/dart-lang/sdk"
default = false

[apt]
packages = ["unzip"]

[install]
requires_root = true
volumes = ["/home/${USERNAME}/.pub-cache"]
default_method = "archive"

[install.methods.archive]
description = "Multi-file Dart SDK zip from storage.googleapis.com/dart-archive"

[install.env]
PUB_CACHE = "/home/${USERNAME}/.pub-cache"
PATH = "/usr/local/dart/bin:$PUB_CACHE/bin:$PATH"

[version]
version_capable = true

[version.source.latest]
type = "json-field"
url = "https://storage.googleapis.com/dart-archive/channels/stable/release/latest/VERSION"
field = "version"

[version.source.checksum]
type = "sidecar"
asset_url = "https://storage.googleapis.com/dart-archive/channels/stable/release/${version}/sdk/dartsdk-linux-${arch}-release.zip"
suffix = ".sha256sum"

[version.source.arch]
amd64 = "x64"
arm64 = "arm64"
