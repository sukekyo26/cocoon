[metadata]
name = "bun"
description = "All-in-one JavaScript runtime & toolkit"
url = "https://github.com/oven-sh/bun"
default = false

[apt]
packages = ["unzip"]

[install]
requires_root = false
volumes = ["/home/${USERNAME}/.bun"]
default_method = "installer"

[install.methods.installer]
description = "Upstream bun.sh / bun.com installer script piped to bash"

[install.env]
BUN_INSTALL = "/home/${USERNAME}/.bun"
PATH = "$BUN_INSTALL/bin:$PATH"

[version]
version_capable = true

[version.source.latest]
type = "github-release"
repo = "oven-sh/bun"
strip_prefix = "bun-v"

[version.source.checksum]
type = "none"
