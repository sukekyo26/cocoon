[metadata]
name = "bun"
description = "All-in-one JavaScript runtime & toolkit"
url = "https://github.com/oven-sh/bun"
default = false

[apt]
packages = ["unzip"]

[install]
requires_root = false
volumes = ["/home/${USERNAME}/.bun"]

[install.env]
BUN_INSTALL = "/home/${USERNAME}/.bun"
PATH = "$BUN_INSTALL/bin:$PATH"

[version]
version_capable = true
