[metadata]
name = "gitleaks"
description = "Secret scanner for git repositories"
url = "https://github.com/gitleaks/gitleaks"
default = false

[install]
requires_root = true
default_method = "binary"

[install.methods.binary]
description = "Single binary extracted from a GitHub Release tarball"

[version]
version_capable = true

[version.source.latest]
type = "github-release"
repo = "gitleaks/gitleaks"
strip_prefix = "v"

[version.source.checksum]
type = "shasums-file"
manifest_url = "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_checksums.txt"
asset_name = "gitleaks_${version}_linux_${arch}.tar.gz"

[version.source.arch]
amd64 = "x64"
arm64 = "arm64"
