[metadata]
name = "Flutter"
description = "Flutter SDK for cross-platform UI (Linux/amd64 only)"
url = "https://github.com/flutter/flutter"
default = false

[apt]
packages = [
  "git",
  "unzip",
  "xz-utils",
  "zip",
  "libglu1-mesa",
  "clang",
  "cmake",
  "ninja-build",
  "pkg-config",
  "libgtk-3-dev",
  "liblzma-dev",
  "build-essential",
]

[install]
requires_root = true
volumes = [
  "/home/${USERNAME}/.pub-cache",
  "/home/${USERNAME}/.flutter",
]
default_method = "archive"

[install.methods.archive]
description = "Multi-file Flutter SDK tarball from storage.googleapis.com/flutter_infra_release (x86_64 only)"

[install.env]
PUB_CACHE = "/home/${USERNAME}/.pub-cache"
FLUTTER_ROOT = "/usr/local/flutter"
PATH = "/usr/local/flutter/bin:/usr/local/flutter/bin/cache/dart-sdk/bin:$PUB_CACHE/bin:$PATH"

[version]
version_capable = true

# No [version.source]: Flutter's releases_linux.json exposes the stable release
# as a commit hash, and the human version (e.g. "3.44.1") lives in a releases[]
# array element matched by that hash — not a simple dotted field cocoon can
# resolve. Flutter is therefore sourceless: `cocoon lock` skips "latest" for it
# (install.archive.sh resolves the latest stable from an empty $PIN at gen time,
# non-reproducibly); pin a version (`"flutter=3.44.1"`) for a reproducible build.
