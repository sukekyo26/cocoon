[metadata]
name = "GitHub CLI"
description = "GitHub command line tool"
url = "https://github.com/cli/cli"
default = false

[install]
requires_root = true
volumes = ["/home/${USERNAME}/.config"]
default_method = "apt"

[install.methods.apt]
description = "Official GitHub CLI apt repository (cli.github.com)"

[version]
version_capable = false
