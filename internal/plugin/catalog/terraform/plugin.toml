[metadata]
name = "Terraform"
description = "Infrastructure as Code by HashiCorp"
url = "https://github.com/hashicorp/terraform"
default = false

[apt]
# gnupg: install.binary.sh verifies the release SHA256SUMS with
# `gpg --batch --verify` (verify = "pgp"); the minimal base ships no gpg.
# Same as aws-cli.
packages = ["unzip", "gnupg"]

[install]
requires_root = true
default_method = "binary"

[install.methods.binary]
description = "Single terraform binary extracted from a releases.hashicorp.com zip"

[version]
version_capable = true
verify = "pgp"

[version.source.latest]
type = "json-field"
url = "https://checkpoint-api.hashicorp.com/v1/check/terraform"
field = "current_version"

[version.source.checksum]
type = "none"

[version.source.arch]
amd64 = "amd64"
arm64 = "arm64"
