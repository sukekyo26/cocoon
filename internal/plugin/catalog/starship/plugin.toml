[metadata]
name = "Starship"
description = "Cross-shell prompt"
url = "https://github.com/starship/starship"
default = false

[install]
requires_root = true
volumes = ["/home/${USERNAME}/.config"]
default_method = "binary"

[install.methods.binary]
description = "Single starship binary extracted from a GitHub Release tarball"

[version]
version_capable = true

[version.source.latest]
type = "github-release"
repo = "starship/starship"
strip_prefix = "v"

[version.source.checksum]
type = "sidecar"
asset_url = "https://github.com/starship/starship/releases/download/v${version}/starship-${arch}-unknown-linux-musl.tar.gz"
suffix = ".sha256"

[version.source.arch]
amd64 = "x86_64"
arm64 = "aarch64"
