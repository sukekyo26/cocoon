[metadata]
name = "mise"
description = "Polyglot runtime version manager"
url = "https://github.com/jdx/mise"
default = false

[install]
requires_root = false
volumes = ["/home/${USERNAME}/.mise"]

[install.env]
MISE_DATA_DIR = "/home/${USERNAME}/.mise"
PATH = "/home/${USERNAME}/.local/bin:$PATH"

[version]
version_capable = true
