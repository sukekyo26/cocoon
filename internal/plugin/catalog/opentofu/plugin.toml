[metadata]
name = "OpenTofu"
description = "Open-source Infrastructure as Code, Terraform fork"
url = "https://github.com/opentofu/opentofu"
default = false

[apt]
# gnupg: install.binary.sh verifies the release SHA256SUMS with
# `gpg --batch --verify` (verify = "pgp"); the minimal base ships no gpg.
# Same as aws-cli.
packages = ["gnupg"]

[install]
requires_root = true
default_method = "binary"

[install.methods.binary]
description = "Single tofu binary extracted from a GitHub Release tarball"

[version]
version_capable = true
verify = "pgp"

[version.source.latest]
type = "github-release"
repo = "opentofu/opentofu"
strip_prefix = "v"

[version.source.checksum]
type = "none"

[version.source.arch]
amd64 = "amd64"
arm64 = "arm64"
