[metadata]
name = "OpenTofu"
description = "Open-source Infrastructure as Code, Terraform fork"
url = "https://github.com/opentofu/opentofu"
default = false

[install]
requires_root = true
default_method = "binary"

[install.methods.binary]
description = "Single tofu binary extracted from a GitHub Release tarball"

[version]
version_capable = true
verify = "pgp"
