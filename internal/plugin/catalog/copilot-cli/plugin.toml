[metadata]
name = "GitHub Copilot CLI"
description = "GitHub Copilot in the CLI — AI-powered command-line assistant"
url = "https://github.com/github/copilot-cli"
default = false

[install]
requires_root = false
volumes = ["/home/${USERNAME}/.copilot"]
default_method = "gh-cli"

[install.methods.gh-cli]
description = "Install via the upstream gh.io install script (default)"

[install.methods.binary]
description = "Direct binary tarball from GitHub Releases — required in environments where gh.io / npm registries are blocked (e.g. Zscaler) or where curl|sh is forbidden by policy"

[install.env]
PATH = "/home/${USERNAME}/.local/bin:$PATH"

[version]
version_capable = true
