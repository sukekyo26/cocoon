[metadata]
name = "GitHub Copilot CLI"
description = "GitHub Copilot in the CLI — AI-powered command-line assistant"
url = "https://github.com/github/copilot-cli"
default = false

[install]
requires_root = false
volumes = ["/home/${USERNAME}/.copilot"]
default_method = "installer"

[install.methods.installer]
description = "Install via the upstream gh.io install script (default)"

[install.methods.binary]
description = "Direct binary tarball from GitHub Releases — for environments where the gh.io installer host / npm registry is unreachable, or where piping curl|sh into a shell is forbidden by policy"

[install.env]
PATH = "/home/${USERNAME}/.local/bin:$PATH"

[version]
version_capable = true

[version.source.latest]
type = "github-release"
repo = "github/copilot-cli"
strip_prefix = "v"

[version.source.checksum]
type = "shasums-file"
manifest_url = "https://github.com/github/copilot-cli/releases/download/v${version}/SHA256SUMS.txt"
asset_name = "copilot-linux-${arch}.tar.gz"

[version.source.arch]
amd64 = "x64"
arm64 = "arm64"
