[metadata]
name = "GitHub Copilot CLI"
description = "GitHub Copilot in the CLI — AI-powered command-line assistant (https://github.com/github/copilot-cli)"
default = false

[install]
requires_root = false
volumes = ["/home/${USERNAME}/.copilot"]

[install.env]
PATH = "/home/${USERNAME}/.local/bin:$PATH"

[version]
version_capable = true
