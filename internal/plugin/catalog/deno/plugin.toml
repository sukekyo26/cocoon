[metadata]
name = "Deno"
description = "Deno JavaScript / TypeScript runtime"
url = "https://github.com/denoland/deno"
default = false

[apt]
packages = ["unzip"]

[install]
requires_root = true
volumes = ["/home/${USERNAME}/.deno"]
default_method = "binary"

[install.methods.binary]
description = "Single ELF binary extracted from a GitHub Release zip"

[install.env]
DENO_DIR = "/home/${USERNAME}/.deno"

[version]
version_capable = true

[version.source.latest]
type = "github-release"
repo = "denoland/deno"
strip_prefix = "v"

[version.source.checksum]
type = "sidecar"
asset_url = "https://github.com/denoland/deno/releases/download/v${version}/deno-${arch}-unknown-linux-gnu.zip"
suffix = ".sha256sum"

[version.source.arch]
amd64 = "x86_64"
arm64 = "aarch64"
