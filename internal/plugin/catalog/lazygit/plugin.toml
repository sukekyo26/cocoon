[metadata]
name = "lazygit"
description = "Terminal UI for git commands"
url = "https://github.com/jesseduffield/lazygit"
default = false

[install]
requires_root = true
default_method = "binary"

[install.methods.binary]
description = "Single binary extracted from a GitHub Release tarball"

[version]
version_capable = true

[version.source.latest]
type = "github-release"
repo = "jesseduffield/lazygit"
strip_prefix = "v"

[version.source.checksum]
type = "shasums-file"
manifest_url = "https://github.com/jesseduffield/lazygit/releases/download/v${version}/checksums.txt"
asset_name = "lazygit_${version}_linux_${arch}.tar.gz"

[version.source.arch]
amd64 = "x86_64"
arm64 = "arm64"
