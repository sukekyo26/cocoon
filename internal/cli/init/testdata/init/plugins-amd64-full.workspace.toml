# workspace.toml — cocoon configuration (generated by `cocoon init`)
# Edit freely; re-run `cocoon gen` to regenerate .devcontainer/.

# [workspace] — generation-wide knobs.
#   mount_root: how much of your filesystem to expose. "." = cwd only, ".." = parent (siblings visible).
#   dir: in-container workdir parent under /home/<user>/. Default "workspace"; slashes allowed for nested paths.
#   devcontainer: emit .devcontainer/devcontainer.json for VS Code Reopen-in-Container.
[workspace]
mount_root = "."
dir = "workspace"
devcontainer = false

# [container] — image identity.
#   service_name: docker-compose `services:` <key>. Used by `docker compose exec <name>`.
#   username / image / image_version: in-container account and FROM <image>:<image_version>.
#   image candidates (DockerHub canonical names): ubuntu, debian, node, python, golang, rust, denoland/deno.
[container]
service_name = "dev"
username = "dev"
image = "ubuntu"
image_version = "22.04"

# docker_socket — bind-mount /var/run/docker.sock so an in-container docker
#   client (e.g. the docker-cli plugin) can reach the host daemon.
# docker_socket = true

# group_add — extra supplementary groups (name or numeric GID) the container user joins.
#   docker_socket = true additionally appends the host docker group.
# group_add = ["audio", "dialout"]

# devices — map host devices into the container (HOST:CONTAINER[:rwm]).
# devices = ["/dev/dri:/dev/dri"]

# ipc — IPC namespace mode; "host" exposes a large shared-memory segment (ML workloads).
# ipc = "host"

# gpus — request GPU access. Only "all" is currently supported.
# gpus = "all"

# [container.resources] — override compose resource defaults (Docker uses unset = unlimited).
#   Tune shm_size, pids_limit, cpus, memory.
# [container.resources]
# shm_size = "2gb"
# pids_limit = 2048

# [container.hosts] — extra /etc/hosts entries.
#   Map hostnames to IP addresses or "host-gateway" (= the host).
# [container.hosts]
# "db.local"     = "host-gateway"
# "corp.example" = "10.0.0.42"

# [container.dns] — custom DNS resolvers and search domains.
#   Useful for corporate DNS or auto-suffixing short hostnames.
# [container.dns]
# servers = ["10.0.0.53", "1.1.1.1"]
# search  = ["corp.example.com"]

# [container.sysctls] — kernel parameters (e.g. for Elasticsearch).
#   Values can be int or string; both are forwarded to docker compose.
# [container.sysctls]
# "vm.max_map_count" = 262144

# [container.capabilities] — Linux capabilities to add or drop.
#   SYS_PTRACE is needed by debuggers (delve, gdb, lldb).
# [container.capabilities]
# add  = ["SYS_PTRACE"]
# drop = ["AUDIT_WRITE"]

# [container.security_opt] — Compose security_opt: seccomp / apparmor / no_new_privileges.
#   "unconfined" relaxes sandboxing; no_new_privileges blocks setuid escalation.
# [container.security_opt]
# seccomp           = "unconfined"
# no_new_privileges = true

# [[container.skel]] — seed dotfiles into the new user's home (via /etc/skel).
#   source: relative to the workspace root (build context); target: relative to /etc/skel.
# [[container.skel]]
# source = ".cocoon/skel/example.bashrc"
# target = ".bashrc"

# [container.shell] — login shell + per-shell rc injection.
#   default: bash | zsh | fish. The generator picks ~/.bashrc / ~/.zshrc / ~/.config/fish/config.fish.
#   aliases / env: appended to the rc file inside the image at build time.
#   bash & zsh use POSIX syntax (alias k='v', export K=V); fish translation is automatic.
#   env values are expanded by the target shell when the rc is sourced, so $HOME / $PATH work
#   (e.g. NPM_CONFIG_PREFIX = "$HOME/.local"). $(cmd) command substitution works on bash/zsh
#   and on fish 3.4+; older fish needs the native (cmd) form. For a literal $, the value
#   passed to the generator must contain \$ — in TOML that's a basic string "\\$RAW"
#   or a literal string '\$RAW'.
#   Alias bodies stay literal until the alias is invoked.
#
# env example (uncomment + edit):
#   env = { EDITOR = "vim", PAGER = "less -R" }
# Caveats:
#   - EDITOR=vim / nano needs the `text-editors` apt category enabled.
#   - EDITOR=code only works when launched from VS Code Dev Containers (the `code` shim is
#     injected by VS Code, not by cocoon).
#   - PAGER=less / less -R needs the `utilities` apt category (less is not in cocoon's minimal base).
[container.shell]
default = "bash"

# [plugins] — enable cocoon plugins (run `cocoon plugin list` for the catalog).
#   Pin versions in [plugins.versions] when you need reproducible builds.
[plugins]
enable = [
    "docker-cli",
    "docker-buildx",
    "aws-cli",
    "aws-sam-cli",
    "github-cli",
    "claude-code",
    "copilot-cli",
    "proto",
    "mise",
    "uv",
    "bun",
    "node",
    "deno",
    "zig",
    "rust",
    "go",
    "lazygit",
    "starship",
    "nerd-fonts",
    "google-chrome",
    "terraform",
    "opentofu",
    "kubectl",
    "helm",
    "shellcheck",
    "shfmt",
]

# [plugins.methods] — install method picked for plugins that declare multiple methods.
#   Plugins with a single declared method ignore this section.
[plugins.methods]
copilot-cli = "binary"

# [plugins.versions] — pinned versions for the enabled plugins above.
#   checksum_amd64 / checksum_arm64 (64 lowercase hex chars) verify downloads — verify = "checksum" plugins only.
[plugins.versions]
aws-cli = { pin = "2.34.48" }
aws-sam-cli = { pin = "1.160.1" }
bun = { pin = "1.3.3" }
copilot-cli = { pin = "1.0.47" }
deno = { pin = "2.7.14" }
docker-buildx = { pin = "0.24.0" }
go = { pin = "1.23.4" }
helm = { pin = "3.16.0" }
kubectl = { pin = "1.31.0" }
lazygit = { pin = "0.44.1" }
mise = { pin = "2025.12.0" }
nerd-fonts = { pin = "3.4.0" }
node = { pin = "24.15.0" }
opentofu = { pin = "1.9.0" }
proto = { pin = "0.46.1" }
shellcheck = { pin = "0.10.0" }
shfmt = { pin = "3.10.0" }
starship = { pin = "1.21.1" }
terraform = { pin = "1.10.5" }
uv = { pin = "0.5.7" }
zig = { pin = "0.13.0" }

# [apt] — extra apt packages installed on top of cocoon's minimal base + selected categories.
#   Re-run `cocoon init --force` to change category checkboxes, or edit this list directly.
[apt]
packages = [
    "vim",
    "nano",
    "git",
    "openssh-client",
    "gnupg",
    "tree",
    "less",
    "rsync",
    "file",
    "bc",
    "wget",
    "gettext-base",
    "uuid-runtime",
    "zip",
    "unzip",
    "xz-utils",
    "tar",
    "gzip",
    "bzip2",
    "build-essential",
    "pkg-config",
    "make",
    "patch",
]

# [apt.mirror] — rewrite upstream apt URLs to a regional mirror.
#   Often a multi-fold first-build speedup. Match your [container].os family.
# [apt.mirror]
# url = "http://jp.archive.ubuntu.com/ubuntu/"

# [apt.proxy] — corporate HTTP/HTTPS proxy for apt-get.
#   Written to /etc/apt/apt.conf.d/95proxy at image build time.
# [apt.proxy]
# http  = "http://proxy.corp:8080"
# https = "http://proxy.corp:8080"

# [[apt.sources]] — third-party apt repositories with signed-by GPG keys.
#   The key is fetched from key_url and dearmored under /etc/apt/keyrings.
# [[apt.sources]]
# name       = "fish-stable"
# suite      = "noble"
# components = ["main"]
# url        = "https://download.opensuse.org/repositories/shells:fish:release:3/xUbuntu_24.04/"
# key_url    = "https://download.opensuse.org/repositories/shells:fish:release:3/xUbuntu_24.04/Release.key"

# [ports] — host ports to forward into the container.
#   Short form ("3000:3000") or long-form table; ranges and protocol/mode supported.
# [ports]
# forward = ["3000:3000", "5432:5432"]

# [volumes] — extra named volumes mapped under the container's home.
#   Persists state across container recreations. Format: <volume-name> = <path inside container>.
# [volumes]
# my-data = "/home/${USERNAME}/.my-tool"

# [env] — environment variables passed into the container.
#   ${VAR} resolves against the host's env at `cocoon gen` time.
# [env]
# OPENAI_API_KEY = "${OPENAI_API_KEY}"
# DEBUG          = "1"

# [[mounts]] — extra bind mounts from the host into the container.
#   readonly = true is safer when sharing credentials like SSH keys.
# [[mounts]]
# source   = "~/.ssh"
# target   = "/home/${USERNAME}/.ssh"
# readonly = true

# [home_files] — files persisted via per-file bind mounts (replaces the v1 [git] section).
#   Each path is relative to ~. Bind-mount the host's ~/.gitconfig to share git identity.
# [home_files]
# files = [".gitconfig", ".claude.json"]

# [locale] — container timezone and language.
#   timezone defaults to the host's; lang must be a UTF-8 locale (e.g. "ja_JP.UTF-8").
# [locale]
# timezone = "Asia/Tokyo"
# lang     = "ja_JP.UTF-8"

# [dockerfile] — inject custom Dockerfile fragments at well-defined hook points.
#   pre_user_setup runs before useradd; post_plugins runs after plugin install.sh's.
# [dockerfile]
# pre_user_setup = """RUN apt-get install -y my-extra-pkg"""
# post_plugins   = """RUN echo done"""

# [certificates] — opt in to TLS certificate auto-bake from ~/.cocoon/certs/.
#   When enable = true, `cocoon gen` wires the host directory into the build via
#   docker-compose's additional_contexts and the Dockerfile's RUN --mount=type=bind,
#   so any *.crt files placed there land in the container's trust store at build time.
#   Useful for Zscaler / corporate proxies / private CAs. Default off → no cert wiring
#   in any generated artifact.
# [certificates]
# enable = true

# [services.<name>] — sidecar services on the same Compose network (e.g. postgres, redis).
#   Reachable from the dev container by service name. Multiple sidecars allowed.
# [services.postgres]
# image       = "postgres:16-alpine"
# environment = { POSTGRES_PASSWORD = "dev" }
# ports       = ["5432:5432"]

# [devcontainer.*] — VS Code Dev Container customizations merged into devcontainer.json.
#   Ignored when [workspace] devcontainer = false. Common: VS Code extensions list.
# [devcontainer.customizations.vscode]
# extensions = [
#     "ms-azuretools.vscode-docker",
#     "eamodio.gitlens",
# ]
