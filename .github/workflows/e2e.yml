name: E2E

# Real Docker round-trip on every push / PR: build the cocoon binary,
# init a fresh project, generate .devcontainer/, then `docker buildx
# bake` the image (via e2e/docker-roundtrip.sh, with GHA cache) and
# `docker compose up -d` + `exec` into the running container so
# generation drift breaks CI before it breaks users. Tear-down is
# handled by a `trap EXIT` inside the script. Plain `docker compose
# build` is intentionally not used — bake is what lets us inject the
# GHA cache backend without baking CI concerns into the generated
# docker-compose.yml.
#
# This workflow runs the lightweight half of the e2e coverage:
#   - preset = minimal (0 plugins)
#   - matrix axis = base image — every entry in
#     internal/config/schema.go's SupportedImages, each at the first
#     (default-recommended) tag from SupportedImageVersions.
#   - amd64 for all images + arm64 for ubuntu only (single arm64 job to
#     surface arm64-specific generator drift without exploding queue
#     time on the PR critical path).
#
# The heavier counterpart — per-plugin install-RUN builds — lives in
# .github/workflows/plugin-e2e.yml: it builds each changed plugin (amd64 +
# arm64, build-only) on a PR and the whole catalog on a weekly cron, with a
# single-plugin workflow_dispatch input for verifying a new plugin before
# merge. plugin-vs-image breakage is therefore caught at PR time for the
# changed plugin and weekly for the rest; plugin-vs-plugin coverage is
# dropped (init-time conflict validation catches most).
#
# Local WSL2 cannot run these (gcc missing for `-race`); GitHub-hosted
# ubuntu-latest / ubuntu-24.04-arm both ship docker + buildx out of the
# box.

on:
  # Push fires for in-progress branches (pre-PR feedback). develop / main
  # are deliberately excluded so a merge does not double up with the
  # pull_request run that already gated it.
  push:
    branches: ["feature/*", "fix/*", "refactor/*"]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker-roundtrip:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: amd64 / ubuntu
            runs-on: ubuntu-latest
            image: ubuntu
            image-version: "26.04"
          - label: amd64 / debian
            runs-on: ubuntu-latest
            image: debian
            image-version: "12"
          - label: amd64 / node
            runs-on: ubuntu-latest
            image: node
            image-version: "26-bookworm-slim"
          - label: amd64 / python
            runs-on: ubuntu-latest
            image: python
            image-version: "3.14-slim-bookworm"
          - label: amd64 / golang
            runs-on: ubuntu-latest
            image: golang
            image-version: "1.26-bookworm"
          - label: amd64 / rust
            runs-on: ubuntu-latest
            image: rust
            image-version: "1.96-bookworm"
          - label: amd64 / denoland/deno
            runs-on: ubuntu-latest
            image: denoland/deno
            image-version: "debian-2.8.2"
          - label: arm64 / ubuntu
            runs-on: ubuntu-24.04-arm
            image: ubuntu
            image-version: "26.04"
          # Extra ubuntu jobs exercise the non-default sudo postures end to
          # end (compose artifact + live kernel flag + sudo behaviour):
          #   none     -> no-new-privileges blocks escalation.
          #   password -> sudo needs the .env.local build secret; a missing
          #               one fails the build (no silent passwordless fallback),
          #               and the seeded password authenticates at runtime.
          # The other entries leave SUDO_MODE unset for the default posture, so
          # all three paths get a real Docker round-trip.
          - label: amd64 / ubuntu / sudo=none
            runs-on: ubuntu-latest
            image: ubuntu
            image-version: "26.04"
            sudo-mode: none
          - label: amd64 / ubuntu / sudo=password
            runs-on: ubuntu-latest
            image: ubuntu
            image-version: "26.04"
            sudo-mode: password
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      # Exposes ACTIONS_RUNTIME_TOKEN / ACTIONS_CACHE_URL / ACTIONS_RESULTS_URL
      # as plain env vars so the raw `docker buildx bake` invocation in
      # the script below can talk to the GHA cache backend.
      # docker/build-push-action and docker/bake-action inject these
      # automatically; a hand-written shell step does not, so we surface
      # them explicitly here.
      - uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0
      - uses: taiki-e/install-action@b1fb785e72add1aaabe1e13115c2292ca8925d3f # v2.75.27 (just)
      - name: Build cocoon binary
        run: just build
      - name: cocoon init + gen + docker compose round-trip
        env:
          COCOON: ${{ github.workspace }}/bin/cocoon
          PRESET: minimal
          IMAGE: ${{ matrix.image }}
          IMAGE_VERSION: ${{ matrix.image-version }}
          SUDO_MODE: ${{ matrix.sudo-mode }}
        run: bash "$GITHUB_WORKSPACE/e2e/docker-roundtrip.sh"
