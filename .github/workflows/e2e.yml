name: E2E

# Real Docker round-trip: build the cocoon binary, init a fresh project,
# generate .devcontainer/, then `docker compose build` + start + exec into
# the container so generation drift breaks CI before it breaks users.
#
# The matrix exercises three axes that historically caught regressions in
# workspace-docker:
#   1. amd64 / minimal — the default-on plugin set (just docker-cli) on
#      ubuntu-latest. Smallest, fastest job; gates the happy path.
#   2. amd64 / full    — every shipped plugin enabled (custom-ps1 dropped
#      against starship's conflict declaration) with all version_capable
#      plugins pinned. Catches plugin-vs-base-image and plugin-vs-plugin
#      breakage; bumping a pinned version surfaces here as a deliberate diff.
#   3. arm64  / full   — the arm64-safe subset on a native ubuntu-24.04-arm
#      runner (no QEMU). Plugins whose install.sh hard-codes amd64 (aws-cli,
#      aws-sam-cli, lazygit, zig, starship, google-chrome) are excluded;
#      custom-ps1 takes starship's slot since that conflict is now moot.
#
# Local WSL2 cannot run any of these (gcc missing for `-race`); GitHub-hosted
# ubuntu-latest / ubuntu-24.04-arm both ship docker + buildx out of the box.

on:
  # Push fires for in-progress branches (pre-PR feedback). develop / main
  # are deliberately excluded so a merge does not double up with the
  # pull_request run that already gated it.
  push:
    branches: ["feature/*", "fix/*", "refactor/*"]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker-roundtrip:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: amd64 / minimal
            runs-on: ubuntu-latest
            preset: minimal
          - label: amd64 / full
            runs-on: ubuntu-latest
            preset: amd64-full
          - label: arm64 / full
            runs-on: ubuntu-24.04-arm
            preset: arm64-full
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: taiki-e/install-action@b1fb785e72add1aaabe1e13115c2292ca8925d3f # just
      - name: Build cocoon binary
        run: just build
      - name: cocoon init + gen + docker compose round-trip
        env:
          COCOON: ${{ github.workspace }}/bin/cocoon
          PRESET: ${{ matrix.preset }}
        run: |
          set -euxo pipefail
          mkdir -p e2e/test-project
          cd e2e/test-project
          git init -q

          # Resolve --plugins / --plugin-versions per preset. The lists are
          # inlined (vs. a fixture TOML) so a pin bump is a one-line YAML
          # edit. Keep this case-stmt and the testdata snapshots in
          # internal/cli/init/testdata/init/ in lockstep — they share the
          # same plugin sets so the goldens act as a structural check on
          # whatever this workflow generates at runtime.
          case "$PRESET" in
            minimal)
              plugins=""
              pins=""
              ;;
            amd64-full)
              plugins="docker-cli,aws-cli,aws-sam-cli,github-cli,claude-code,copilot-cli,proto,mise,uv,bun,zig,rust,go,lazygit,starship,nerd-fonts,google-chrome,terraform,opentofu"
              pins="bun=1.3.3,copilot-cli=0.0.369,go=1.23.4,lazygit=0.44.1,mise=2025.12.0,opentofu=1.9.0,proto=0.46.1,starship=1.21.1,terraform=1.10.5,uv=0.5.7,zig=0.13.0"
              ;;
            arm64-full)
              # Excluded vs amd64-full (install.sh hard-codes amd64):
              #   aws-cli, aws-sam-cli, lazygit, zig, starship, google-chrome.
              # custom-ps1 takes starship's conflict slot.
              plugins="docker-cli,github-cli,claude-code,copilot-cli,proto,mise,uv,bun,rust,go,custom-ps1,nerd-fonts,terraform,opentofu"
              pins="bun=1.3.3,copilot-cli=0.0.369,go=1.23.4,mise=2025.12.0,opentofu=1.9.0,proto=0.46.1,terraform=1.10.5,uv=0.5.7"
              ;;
            *)
              echo "unknown preset: $PRESET" >&2
              exit 1
              ;;
          esac

          extra=()
          [ -n "$plugins" ] && extra+=(--plugins "$plugins")
          [ -n "$pins" ] && extra+=(--plugin-versions "$pins")

          # service-name and the in-container username are kept identical
          # ("dev") so the `docker compose exec dev` step below targets the
          # right service. Using a different service-name (e.g. "e2e") would
          # silently break exec because `exec <service>` resolves against
          # the compose service id, which mirrors workspace.toml's
          # [container].service_name.
          # Match cocoon's full default-on apt category set so default-on
          # plugins (e.g. docker-cli, which calls gpg in install.sh via the
          # vcs category) build cleanly. Trimming this list in CI hides
          # plugin-vs-category mismatches that real users would hit.
          "$COCOON" init --yes \
            --service-name dev \
            --username dev \
            --os ubuntu \
            --os-version 22.04 \
            --mount-root . \
            --no-devcontainer \
            --apt-categories=text-editors,vcs,utilities,compression,build \
            "${extra[@]}"
          "$COCOON" gen
          # The generated tree must land under .devcontainer/ exclusively;
          # any leakage back into config/ or to the project root is a regression.
          # The .env file is critical for compose interpolation (UID/GID/
          # DOCKER_GID/CONTAINER_SERVICE_NAME/OS_IMAGE/OS_VERSION/USERNAME);
          # without it `docker compose build` fails with
          # `failed to parse stage name ":": invalid reference format`.
          test -f .devcontainer/Dockerfile
          test -f .devcontainer/docker-compose.yml
          test -f .devcontainer/docker-entrypoint.sh
          test -f .devcontainer/.env
          test ! -d config
          # Build via `docker buildx bake` to opt into BuildKit's GHA cache backend.
          # `docker compose build` cannot pass cache-from/cache-to without baking
          # CI concerns into the generated docker-compose.yml (which is the
          # user-visible artifact). Bake reads the same compose file and lets us
          # inject cache settings purely on the CI side.
          # `--allow fs=*` is required because additional_contexts.plugins points
          # at ${HOME}/.cocoon/cache/build-context, which is outside the compose
          # file's directory and rejected by bake's default entitlements.
          # `scope=e2e-${PRESET}` keeps amd64-full / arm64-full / minimal in
          # separate cache buckets; GHA cache backend further isolates by branch
          # automatically. mode=max captures all layers (within the 10GB/repo
          # limit; revisit if buckets approach the cap).
          # The subsequent `compose up -d` reuses the just-loaded image instead
          # of rebuilding.
          arch="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          docker buildx bake \
            -f .devcontainer/docker-compose.yml \
            --load \
            --allow fs=* \
            --set "*.cache-from=type=gha,scope=e2e-${PRESET}" \
            --set "*.cache-to=type=gha,scope=e2e-${PRESET},mode=max" \
            --set "*.platform=linux/${arch}" \
            dev
          docker compose -f .devcontainer/docker-compose.yml up -d
          docker compose -f .devcontainer/docker-compose.yml exec -T dev bash -lc 'echo cocoon-e2e-ok'
          docker compose -f .devcontainer/docker-compose.yml down -v
