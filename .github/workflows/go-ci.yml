name: Go CI

on:
  # Push fires for in-progress branches (pre-PR feedback) and for develop, so
  # a merge re-validates the integrated state: feature PRs may have been gated
  # against an older develop, and develop pushes would otherwise run no CI at
  # all. main stays PR-only — the develop->main release PR reruns the full
  # suite. e2e / plugin-e2e remain push-excluded (too heavy); only this
  # lightweight go gate runs on develop pushes.
  push:
    branches: ["feature/*", "fix/*", "refactor/*", develop]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:
  workflow_call:

# Cancel earlier in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (golangci-lint v2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: taiki-e/install-action@b1fb785e72add1aaabe1e13115c2292ca8925d3f # v2.75.27 (just)
      # install.sh pinned to the golangci-lint v2.11.4 commit so the fetched
      # script is immutable; the script itself SHA256-verifies the binary.
      - name: Install golangci-lint v2.11.4
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/8f3b0c7ed018e57905fbd873c697e0b1ede605a5/install.sh | \
            sh -s -- -b "$(go env GOPATH)/bin" v2.11.4
      - run: just lint
      - run: just fmt-check

  test:
    name: Test (race + shuffle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: taiki-e/install-action@b1fb785e72add1aaabe1e13115c2292ca8925d3f # v2.75.27 (just)
      - run: just vet
      - run: just mod-verify
      - run: just test-race

  coverage:
    name: Coverage gate (>= 90%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: taiki-e/install-action@b1fb785e72add1aaabe1e13115c2292ca8925d3f # v2.75.27 (just)
      - run: just cover-check

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: taiki-e/install-action@b1fb785e72add1aaabe1e13115c2292ca8925d3f # v2.75.27 (just)
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
      - run: just vuln

  build:
    name: Cross-compile (linux/darwin x amd64/arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: taiki-e/install-action@b1fb785e72add1aaabe1e13115c2292ca8925d3f # v2.75.27 (just)
      - run: just build-all
