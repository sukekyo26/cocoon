name: Release

on:
  push:
    branches: [main]
    paths: [VERSION]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-version:
    name: Check version change
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Extract version from VERSION file
        id: version
        run: |
          version=$(tr -d '[:space:]' < VERSION)
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${version} (tag: ${tag})"

          if git tag -l "${tag}" | grep -q "${tag}"; then
            echo "Tag ${tag} already exists — skipping"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  ci:
    name: CI
    needs: [check-version]
    if: needs.check-version.outputs.changed == 'true'
    uses: ./.github/workflows/go-ci.yml

  release:
    name: Build release assets and create GitHub release
    needs: [check-version, ci]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    # contents: tag push + release upload. id-token + attestations: build provenance (Sigstore).
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: taiki-e/install-action@b1fb785e72add1aaabe1e13115c2292ca8925d3f # v2.75.27 (just)
        with:
          tool: just

      - name: Build release assets
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: just release-assets

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            bin/cocoon-linux-amd64
            bin/cocoon-linux-arm64
            bin/cocoon-darwin-amd64
            bin/cocoon-darwin-arm64
            bin/SHA256SUMS

      # Release tags are GPG-signed. Fail closed: a missing signing key aborts
      # the release rather than publishing an unsigned tag. Provision the key
      # once as repo secrets (Settings → Secrets and variables → Actions):
      #   GPG_PRIVATE_KEY — ASCII-armored private signing key (required)
      #   GPG_PASSPHRASE  — its passphrase (only if the key is protected)
      - name: Require a signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -z "${GPG_PRIVATE_KEY:-}" ]; then
            echo "::error::GPG_PRIVATE_KEY secret is not set — release tags must be signed." >&2
            echo "Add the ASCII-armored signing key as the GPG_PRIVATE_KEY repository secret" >&2
            echo "(and GPG_PASSPHRASE if the key is passphrase-protected), then re-run." >&2
            exit 1
          fi

      - name: Import GPG signing key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_tag_gpgsign: true

      - name: Create signed version tag
        env:
          TAG: ${{ needs.check-version.outputs.tag }}
        run: |
          git tag -s -m "$TAG" "$TAG"
          git push origin "$TAG"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: ${{ needs.check-version.outputs.tag }}
          files: |
            bin/cocoon-linux-amd64
            bin/cocoon-linux-arm64
            bin/cocoon-darwin-amd64
            bin/cocoon-darwin-arm64
            bin/SHA256SUMS
            install.sh
          generate_release_notes: true
