[metadata]
name = "proto"
description = "Multi-language version manager (https://github.com/moonrepo/proto)"
default = false

[apt]
packages = [
    "build-essential",
    "libssl-dev",
    "zlib1g-dev",
    "libbz2-dev",
    "libreadline-dev",
    "libsqlite3-dev",
    "libncursesw5-dev",
    "tk-dev",
    "libxml2-dev",
    "libxmlsec1-dev",
    "libffi-dev",
    "liblzma-dev",
]

[install]
requires_root = false
volumes = ["/home/${USERNAME}/.proto"]

[install.env]
PROTO_HOME = "/home/${USERNAME}/.proto"
PATH = "$PROTO_HOME/shims:$PROTO_HOME/bin:$PATH"

[version]
version_capable = true
