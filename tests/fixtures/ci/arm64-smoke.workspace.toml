# CI fixture: arm64 cross-architecture smoke build.
#
# Used by .github/workflows/ci.yml docker-build matrix when platforms=linux/arm64.
# QEMU emulation makes a full plugin install prohibitively slow (>1h), so this
# fixture intentionally enables only the version_capable plugins whose install
# scripts actually branch on architecture (Go, Rust, Zig, lazygit, starship,
# uv, proto, copilot-cli, github-cli, terraform, opentofu). If any of these
# picks the wrong arch-suffixed download URL the smoke build will fail at
# install time.
#
# The arm64 job runs `verify-image: 'false'`, so wsd verify-image is
# not executed (many of its assertions invoke binaries that QEMU cannot run
# reliably). The build itself completing successfully is the smoke signal.

[container]
service_name = "ci-arm64"
username = "testuser"
os = "ubuntu"
os_version = "24.04"

# Login shell: fish. Together with latest (bash) and pinned (zsh) this fixture
# rounds out CI coverage of all three supported shells. fish is the most
# divergent (set -gx instead of export, native completions, no .bashrc), so
# verifying the arm64 cross-build with fish catches shell-syntax regressions
# in the rc-loader template and plugin install scripts.
[container.shell]
default = "fish"

[plugins]
enable = [
    "github-cli",
    "copilot-cli",
    "proto",
    "uv",
    "zig",
    "rust",
    "go",
    "lazygit",
    "starship",
    "terraform",
    "opentofu",
]

[plugins.versions]
go = { pin = "1.23.4" }
lazygit = { pin = "0.44.1" }
starship = { pin = "1.21.1" }
zig = { pin = "0.13.0" }
uv = { pin = "0.5.7" }
proto = { pin = "0.46.1" }
copilot-cli = { pin = "0.0.369" }
terraform = { pin = "1.10.5" }
opentofu = { pin = "1.9.0" }

[ports]
forward = ["3000:3000"]

# OS-4..8: Compose pass-through sections. Touch only docker-compose.yml, not
# the Dockerfile, so they add zero QEMU build cost. Useful here because they
# verify the generator emits matching YAML keys for arm64 fixtures.
[container.hosts]
"db.local" = "host-gateway"

[container.dns]
servers = ["1.1.1.1"]

[container.sysctls]
"net.ipv4.ip_unprivileged_port_start" = 0

[container.capabilities]
add = ["SYS_PTRACE"]

[container.security_opt]
no_new_privileges = true

# OS-13: a single COPY into /etc/skel. Uses an existing repo file so the
# arm64 QEMU build does not need any additional fixture data.
[[container.skel]]
source = "config/shell_custom.example"
target = ".shell_skel_example"
