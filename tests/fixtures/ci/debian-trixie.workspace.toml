# CI fixture: Debian 13 (trixie) base image smoke build.
#
# Same shape as debian-bookworm but pinned to trixie so any
# version-specific regression (apt sources.list.d format, package name
# renames, gpg keyring path differences) surfaces independently. Kept
# minimal — full plugin coverage already lives in the pinned/latest
# fixtures.

[container]
service_name = "ci-debian-trixie"
username = "testuser"
os = "debian"
os_version = "13"

[plugins]
enable = ["docker-cli", "go"]

[plugins.versions]
go = { pin = "1.23.4" }

[ports]
forward = ["3000:3000"]

[apt]
packages = []
