# CERT-01 regression fixture — HTTPS [apt.mirror] + HTTPS [[apt.sources]] +
# certs/*.crt corporate CA. Locks down the COPY order so the cert install
# RUN always precedes the apt install RUN (otherwise `apt-get update` against
# a corporate-CA-signed mirror fails TLS handshake on ubuntu:24.04).
[container]
service_name = "certs-https-test"
username = "testuser"
os = "ubuntu"
os_version = "24.04"

[plugins]
enable = []

[apt.mirror]
url = "https://archive.ubuntu.com/ubuntu/"

[[apt.sources]]
name = "example-corp"
suite = "noble"
components = ["main"]
url = "https://apt.example.corp/ubuntu/"
key_url = "https://apt.example.corp/keyring.gpg"
