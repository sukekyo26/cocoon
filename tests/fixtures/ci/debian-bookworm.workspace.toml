# CI fixture: Debian 12 (bookworm) base image smoke build.
#
# Verifies the OS abstraction added to [container].os / os_version actually
# generates a Debian-targeted Dockerfile (FROM debian:12, deb.debian.org
# mirror rewrite targets, /etc/os-release ID branch in docker-cli) and that
# the apt-base-packages list installs cleanly on Debian 12. Plugin coverage
# is intentionally narrow: docker-cli exercises the OS-conditional repo URL,
# go and rust cover the curl-bash / GitHub Releases install paths so a
# Debian-specific regression in dpkg/curl/sha256sum surfaces here.

[container]
service_name = "ci-debian-bookworm"
username = "testuser"
os = "debian"
os_version = "12"

[plugins]
enable = ["docker-cli", "go", "rust"]

[plugins.versions]
go = { pin = "1.23.4" }

[ports]
forward = ["3000:3000"]

[apt]
packages = []
